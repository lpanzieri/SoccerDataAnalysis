<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Inter badge with team name</title>
  <desc id="desc">Official badge loaded from database and team name text.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="lineBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00a3ff"/>
      <stop offset="100%" stop-color="#0066cc"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>

  <g transform="translate(210,210)">
    <circle r="132" fill="#0b1220" stroke="#1f2937" stroke-width="2"/>
    <circle r="121" fill="none" stroke="#00a3ff" stroke-opacity="0.35" stroke-width="8"/>
    <image x="-92" y="-92" width="184" height="184" href="data:image/png;base64,"/>
  </g>

  <g transform="translate(400,240)">
    <text x="0" y="0" fill="#f8fafc" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-size="98" font-weight="700" letter-spacing="5">INTER</text>
    <rect x="0" y="20" width="470" height="6" fill="url(#lineBlue)"/>
  </g>
</svg>
