<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-labelledby="title desc">
  <title id="title">Inter team mark with name</title>
  <desc id="desc">A stylized Inter-inspired crest and the text Inter.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="ringBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00a3ff"/>
      <stop offset="100%" stop-color="#0066cc"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Crest -->
  <g transform="translate(200,200)">
    <circle r="130" fill="#000000"/>
    <circle r="120" fill="none" stroke="url(#ringBlue)" stroke-width="12"/>
    <circle r="102" fill="none" stroke="#000000" stroke-width="10"/>
    <circle r="84" fill="none" stroke="url(#ringBlue)" stroke-width="10"/>

    <!-- Stylized IM monogram -->
    <g fill="none" stroke="#f4f6f8" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
      <!-- I -->
      <path d="M -28 -58 L -28 58"/>
      <!-- M -->
      <path d="M -2 58 L -2 -58 L 32 6 L 66 -58 L 66 58"/>
      <!-- Outer N-style framing -->
      <path d="M -58 58 L -58 -58 L 96 58 L 96 -58" opacity="0.9"/>
    </g>
  </g>

  <!-- Team name -->
  <g transform="translate(390,235)">
    <text x="0" y="0" fill="#f8fafc" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-size="96" font-weight="700" letter-spacing="4">INTER</text>
    <rect x="0" y="18" width="420" height="6" fill="url(#ringBlue)"/>
    <text x="0" y="62" fill="#93c5fd" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-size="26" letter-spacing="3">MILANO</text>
  </g>
</svg>
